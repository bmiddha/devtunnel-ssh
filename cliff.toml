# git-cliff configuration — generates CHANGELOG.md and release notes from
# Conventional Commits (https://www.conventionalcommits.org).
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented here. This file is generated
from [Conventional Commits](https://www.conventionalcommits.org) by
[git-cliff](https://git-cliff.org).
"""
# Tera template (https://keats.github.io/tera/docs/#introduction).
# `$REPO_URL` is substituted by the postprocessor below.
# Only released (tagged) versions are rendered — unreleased commits are omitted.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}]\
    {% if previous.version %} ([compare]($REPO_URL/compare/{{ previous.version }}...{{ version }})){% endif %}\
    {{ " " }}- {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }} \
            ([{{ commit.id | truncate(length=7, end="") }}]($REPO_URL/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
{% endif %}\
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
postprocessors = [
  { pattern = '\$REPO_URL', replace = "https://github.com/bmiddha/devtunnel-ssh" },
]

[git]
conventional_commits = true
# Drop non-conventional commits (merge commits, etc.) from the changelog.
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  # Turn "(#123)" PR/issue refs into links.
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/bmiddha/devtunnel-ssh/issues/${2}))" },
]
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 3 -->🚜 Refactor" },
  { message = "^doc", group = "<!-- 4 -->📚 Documentation" },
  { message = "^test", group = "<!-- 5 -->🧪 Testing" },
  { message = "^ci|^build", group = "<!-- 6 -->👷 CI & Build" },
  { message = "^style", group = "<!-- 7 -->🎨 Styling" },
  # Never list the automated release commits themselves.
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore|^revert", group = "<!-- 8 -->⚙️ Miscellaneous" },
  { body = ".*security", group = "<!-- 9 -->🛡️ Security" },
]
filter_commits = false
topo_order = false
sort_commits = "oldest"

[git.remote.github]
owner = "bmiddha"
repo = "devtunnel-ssh"
