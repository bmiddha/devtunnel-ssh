version: 2

# Keep NuGet packages and GitHub Actions up to date. Commits use the
# `chore(deps)` / `chore(deps-dev)` prefix (prefix: chore + include: scope) so
# they satisfy the Conventional Commits PR check and are skipped from the
# git-cliff changelog (.config/cliff.toml skips `^chore\(deps.*\)`).
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      nuget:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions:
        patterns:
          - "*"
