name: ✅ conventional-commits

# Enforces the Conventional Commits spec on pull requests. Because this repo does
# NOT squash-merge, every individual commit feeds the generated changelog, so we
# validate both the PR title and each commit message in the PR.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

# Only keep the latest run per PR.
concurrency:
  group: conventional-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: 🏷️ Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Lint PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commits:
    name: 📝 Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Lint commit messages
        uses: webiny/action-conventional-commits@v1.4.2
